  ros__parameters:
    use_sim_time: true
    publish_odom: /laser/odom
    publish_tf: false
    base_frame: base_footprint
    odom_frame: odom
    laser_frame: lidar_link

ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 50.0
    sensor_timeout: 0.1
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    debug: false
    publish_tf: true
    publish_acceleration: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    odom0: /wheel/odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true, false, false,
                   false, false, false,
                   false, false, false]
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false
    odom0_twist_rejection_threshold: 2.0

    odom1: /laser/odom
    odom1_config: [true, true, false,
                   false, false, false,
                   true, true, false,
                   false, false, false,
                   false, false, false]
    odom1_queue_size: 10
    odom1_differential: false
    odom1_relative: false
    odom1_twist_rejection_threshold: 2.0

    imu0: /imu/data/filtered
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_queue_size: 20
    imu0_differential: false
    imu0_relative: true
    imu0_remove_gravitational_acceleration: true
    imu0_twist_rejection_threshold: 1.5

    process_noise_covariance: [0.08, 0.08, 1.0,
                               1.0, 1.0, 0.08,
                               0.05, 0.05, 1.0,
                               1.0, 1.0, 0.05,
                               0.2, 0.2, 1.0]

    initial_estimate_covariance: [1e-3, 1e-3, 1.0,
                                  1.0, 1.0, 1e-3,
                                  1e-3, 1e-3, 1.0,
                                  1.0, 1.0, 1e-3,
                                  0.5, 0.5, 1.0]

slam_toolbox:
  ros__parameters:
    use_sim_time: true
    
    # ---------------------------------------------------------
    # OPERATIONAL MODE
    # ---------------------------------------------------------
    # Options: 
    #   'mapping': The robot builds a map from scratch. It constantly adds new 
    #              obstacles to the pose graph and updates the global map.
    #   'localization': The robot uses a previously saved map. It does not add 
    #                   permanent new features to the base map, significantly 
    #                   reducing CPU usage. Use this after mapping is complete.
    mode: mapping 
    
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    scan_queue_size: 1
    use_map_saver: true
    
    # Represents: Map pixel size in meters (0.05 = 5cm per pixel).
    # Behavior: 
    #   - Lower (e.g., 0.02): Extremely detailed map, but exponentially increases 
    #     RAM and CPU usage. Path planning takes longer.
    #   - Higher (e.g., 0.10): Blocky, low-resolution map. Very lightweight on 
    #     CPU, but might close off narrow doorways.
    resolution: 0.05 

    # ---------------------------------------------------------
    # MAP PUBLISHING & TIMING
    # ---------------------------------------------------------
    # Represents: Time in seconds between publishing the 2D occupancy grid (/map).
    # Behavior:
    #   - Lower (e.g., 0.5): The map visually updates rapidly in RViz. High CPU cost.
    #   - Higher (e.g., 2.0 or 5.0): The map visually updates slowly. Saves a lot of CPU. 
    #     Note: This ONLY affects the visual map, not the internal tracking accuracy.
    map_update_interval: 0.5 # 2.0
    
    # Represents: Time in seconds between publishing the map -> odom TF.
    # Behavior: 0.02 represents 50Hz. Keep this matched to your EKF frequency 
    # to prevent tf extrapolation errors.
    transform_publish_period: 0.02 
    tf_buffer_duration: 30.0
    
    # Represents: Minimum time in seconds between processing LiDAR scans.
    # Behavior: Limits how fast the system ingests data. 0.05 means max 20 scans 
    # per second. Prevents the SLAM node from choking the CPU if the LiDAR spins too fast.
    minimum_time_interval: 0.05 # 0.1

    # ---------------------------------------------------------
    # SCAN INSERTION LOGIC (Crucial for CPU & Accuracy)
    # ---------------------------------------------------------
    # Represents: Maximum distance in meters to trust a LiDAR point.
    # Behavior: If your LiDAR is noisy past 8 meters, set this to 8.0. Points beyond 
    # this range are ignored, preventing false walls from being drawn due to sensor noise.
    max_laser_range: 12.0 
    
    # Represents: Distance in meters the robot must move before processing a new scan.
    # Behavior:
    #   - Lower (e.g., 0.01): The robot processes a scan almost constantly while moving. 
    #     Creates a very dense, accurate map but burns massive CPU.
    #   - Higher (e.g., 0.25): The robot drives a quarter-meter before caring about 
    #     new lidar data. Saves CPU but can cause jerky map updates.
    minimum_travel_distance: 0.05 #0.10
    
    # Represents: Rotation in radians the robot must turn before processing a new scan.
    # Behavior: 0.05 rad is ~2.8 degrees. Same trade-off as minimum_travel_distance.
    minimum_travel_heading: 0.05 #0.10

    # ---------------------------------------------------------
    # SCAN MATCHING & LOOP CLOSURE
    # ---------------------------------------------------------
    use_scan_matching: true 
    use_scan_barycenter: true
    
    # Options: true / false
    # Behavior: If true, the robot searches its history to see if it has returned 
    # to a previously mapped area. If it has, it "snaps" the map together to correct 
    # long-term drift. Warning: Finding a loop causes a massive, temporary CPU spike.
    do_loop_closing: true 
    
    # Represents: Number of consecutive scans that must match to confirm a loop closure.
    # Behavior: 
    #   - Lower (e.g., 3): Aggressive loop closing. Fixes drift quickly but risks 
    #     "hallucinating" loops in corridors that look identical, ruining the map.
    #   - Higher (e.g., 15): Conservative. Very safe, but might fail to close a loop 
    #     if the robot drives through an area too quickly.
    loop_match_minimum_chain_size: 10 
    
    # Represents: Radius in meters around the robot to search for loop closures.
    # Behavior: 
    #   - Lower (e.g., 2.0): Fast to compute, but if your odometry drifted by 3 meters, 
    #     it will never find the loop.
    #   - Higher (e.g., 10.0): Can fix massive odometry drift, but searching a 10m 
    #     radius takes exponentially more CPU time.
    loop_search_maximum_distance: 6.0 
    
    # Represents: A physical search box size in meters for scan matching.
    # Behavior: When odometry says the robot moved, the scan matcher shifts the new 
    # scan around inside this box to find the absolute perfect fit.
    #   - Lower (e.g., 0.1): Very fast. Only works if your wheel odometry is highly accurate.
    #   - Higher (e.g., 1.0): Searches a massive 1x1m box. Required if your swerve wheels 
    #     are slipping severely, but eats CPU.
    correlation_search_space_dimension: 0.5 
    
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # ---------------------------------------------------------
    # SOLVER TUNING (Advanced)
    # ---------------------------------------------------------
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

map_server:
  ros__parameters:
    use_sim_time: true
    topic_name: /map
    frame_id: map
    yaml_filename: ""

amcl:
  ros__parameters:
    use_sim_time: true
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: base_footprint
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: map
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 12.0
    laser_min_range: 0.0
    laser_model_type: likelihood_field
    max_beams: 80
    max_particles: 2000
    min_particles: 500
    odom_frame_id: odom
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: nav2_amcl::OmniMotionModel
    save_pose_rate: 0.5
    scan_topic: /scan
    set_initial_pose: false
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 0.3
    update_min_a: 0.05
    update_min_d: 0.1
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.45
    z_short: 0.05
