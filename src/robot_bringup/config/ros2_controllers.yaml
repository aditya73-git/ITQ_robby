controller_manager:
  ros__parameters:
    update_rate: 50

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

diff_drive_controller:
  ros__parameters:
    left_wheel_names:  [front_left_wheel_joint,  rear_left_wheel_joint]
    right_wheel_names: [front_right_wheel_joint, rear_right_wheel_joint]

    wheel_separation: 0.70
    wheel_radius:     0.075

    # Odometrie
    pose_covariance_diagonal:     [0.001, 0.001, 1000.0, 1000.0, 1000.0, 0.01]
    twist_covariance_diagonal:    [0.001, 0.001, 1000.0, 1000.0, 1000.0, 0.01]
    open_loop:                    true   # keine Encoder → open loop
    enable_odom_tf:               true
    publish_rate:                 50.0

    # Geschwindigkeitslimits
    linear.x.max_velocity:        1.0
    linear.x.min_velocity:       -1.0
    linear.x.max_acceleration:    2.0
    angular.z.max_velocity:       2.0
    angular.z.min_velocity:      -2.0
    angular.z.max_acceleration:   4.0

    cmd_vel_timeout: 0.5
    use_stamped_vel: false
